<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ProjectProof{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0f1923;
      --ink-mid:  #3a4a58;
      --ink-soft: #8a9baa;
      --rule:     #d4dce3;
      --paper:    #f5f6f4;
      --white:    #ffffff;
      --red:      #c0392b;
      --green:    #1a6640;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* TOPBAR */
    .topbar {
      border-bottom: 1px solid var(--rule);
      background: var(--white);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .topbar-brand span { color: var(--red); }
    .topbar-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .topbar-meta .role-badge {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-mid);
      font-weight: 500;
    }
    .topbar-meta a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar-meta a:hover { color: var(--red); border-color: var(--red); }

    /* MAIN */
    .main {
      padding: 2rem 1.5rem 4rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .page-eyebrow {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.3rem;
    }
    .page-title {
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .page-title strong { font-weight: 500; }

    /* STAT STRIP */
    .stat-strip {
      display: flex;
      border: 1px solid var(--rule);
      background: var(--white);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .stat-item {
      flex: 1;
      padding: 1rem 1.25rem;
      border-right: 1px solid var(--rule);
      min-width: 0;
    }
    .stat-item:last-child { border-right: none; }
    .stat-value {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.56rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.2rem;
    }

    /* SECTION */
    .section { margin-bottom: 2.5rem; }
    .section-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* LEDGER TABLE */
    .ledger {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.8rem;
    }
    .ledger thead tr { border-bottom: 2px solid var(--ink); }
    .ledger thead th {
      text-align: left;
      padding: 0.5rem 0.75rem 0.5rem 0;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .ledger thead th:last-child { text-align: right; }
    .ledger tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background 0.1s;
    }
    .ledger tbody tr:hover { background: rgba(0,0,0,0.02); }
    .ledger tbody td {
      padding: 0.7rem 0.75rem 0.7rem 0;
      color: var(--ink-mid);
      vertical-align: top;
    }
    .ledger tbody td:last-child { text-align: right; color: var(--ink); font-weight: 600; }
    .log-comment { font-family: var(--sans); font-size: 0.83rem; color: var(--ink); }
    .log-meta { font-size: 0.65rem; color: var(--ink-soft); margin-top: 0.1rem; }
    .pts { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
    .pts.zero { color: var(--ink-soft); }

    /* FORM */
    .form-field { margin-bottom: 1.75rem; }
    .form-field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
    }
    .form-field select,
    .form-field input[type="text"],
    .form-field input[type="password"],
    .form-field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--ink);
      border-radius: 0;
      padding: 0.5rem 0;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-field select { cursor: pointer; }
    .form-field select option { background: var(--white); }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: var(--red); }
    .form-field textarea { resize: none; min-height: 68px; }

    /* POINTS SELECTOR */
    .pts-selector { display: flex; }
    .pts-selector input[type="radio"] { display: none; }
    .pts-selector label {
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink-mid);
      border: 1px solid var(--rule);
      border-left: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .pts-selector label:first-of-type { border-left: 1px solid var(--rule); }
    .pts-selector input[type="radio"]:checked + label {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }

    /* BUTTONS */
    .btn-submit {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--white);
      background: var(--ink);
      border: none;
      padding: 0.75rem 1.75rem;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn-submit:hover { background: var(--red); }
    .danger-btn {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      background: transparent;
      border: 1px solid transparent;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .danger-btn:hover { border-color: var(--red); background: var(--red); color: var(--white); }

    /* NOTICE */
    .notice {
      font-family: var(--mono);
      font-size: 0.76rem;
      padding: 0.7rem 0;
      border-top: 1px solid;
      border-bottom: 1px solid;
      margin-bottom: 1.5rem;
    }
    .notice.ok  { color: var(--green); border-color: var(--green); }
    .notice.err { color: var(--red);   border-color: var(--red); }

    /* EMPTY */
    .empty {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-soft);
      padding: 1.25rem 0;
      letter-spacing: 0.04em;
    }

    /* TIMELINE */
    .timeline { position: relative; }
    .timeline-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0 1rem;
      margin-bottom: 1.1rem;
      position: relative;
    }
    .timeline-item:last-child { margin-bottom: 0; }
    .t-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ink);
      margin-top: 0.42rem;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .t-dot.milestone {
      background: var(--red);
      width: 9px;
      height: 9px;
      margin-top: 0.35rem;
    }
    .timeline-item:not(:last-child) .t-dot::after {
      content: '';
      position: absolute;
      top: 7px;
      left: 3px;
      width: 1px;
      height: calc(100% + 1.1rem - 7px);
      background: var(--rule);
    }
    .t-dot.milestone::after { left: 4px !important; }
    .t-entry {
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--ink);
      line-height: 1.5;
    }
    .t-entry.ms { font-weight: 500; }
    .ms-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 0.08rem 0.3rem;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .t-meta {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ink-soft);
      margin-top: 0.15rem;
    }

    /* CARD */
    .card {
      border: 1px solid var(--rule);
      background: var(--white);
      margin-bottom: 1.25rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .card-subtitle {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--ink-soft);
      margin-top: 0.1rem;
      line-height: 1.6;
    }
    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .card-body { padding: 0 1.25rem; }
    .card-section { padding: 1.25rem; border-top: 1px solid var(--rule); }
    .card-section:first-child { border-top: none; }

    /* TOGGLE BTN */
    .toggle-btn {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mid);
      background: transparent;
      border: 1px solid var(--rule);
      padding: 0.22rem 0.55rem;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
      white-space: nowrap;
    }
    .toggle-btn:hover { border-color: var(--ink-mid); }
    .toggle-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    /* COLLAPSIBLE */
    .collapsible { display: none; }
    .collapsible.open { display: block; }

    /* MEMBER ROW */
    .member-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--rule);
      gap: 0.5rem;
    }
    .member-row:last-child { border-bottom: none; }
    .member-name { font-size: 0.88rem; font-weight: 500; color: var(--ink); }
    .member-sub {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--ink-soft);
      margin-top: 0.08rem;
    }
    .member-pts {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      text-align: right;
      min-width: 2rem;
    }
    .member-pts-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: right;
    }
    .member-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    /* MILESTONE CHECKBOX */
    .milestone-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .milestone-check input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }
    .milestone-check label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mid);
      cursor: pointer;
    }

    /* LOGIN */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      padding: 1.5rem;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 2rem;
      background: var(--white);
      border-top: 3px solid var(--ink);
    }
    .login-brand {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 2rem;
    }
    .login-brand strong {
      display: block;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 500;
      margin-top: 0.2rem;
    }
    .login-brand strong em { font-style: normal; color: var(--red); }

    /* LATEST UPDATE BADGE */
    .latest-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--white);
      padding: 0.1rem 0.4rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .main { padding: 1.25rem 1rem 3rem; }
      .topbar { padding: 0 1rem; }
      .topbar-meta .role-badge { display: none; }
      .stat-strip { flex-wrap: wrap; }
      .stat-item { min-width: 50%; border-bottom: 1px solid var(--rule); }
      .stat-item:nth-child(2n) { border-right: none; }
      .stat-item:last-child { border-bottom: none; }
      .card-header { flex-direction: column; align-items: flex-start; }
      .card-actions { width: 100%; justify-content: flex-end; }
      .ledger thead { display: none; }
      .ledger tbody tr {
        display: block;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--rule);
      }
      .ledger tbody td {
        display: block;
        padding: 0.15rem 0;
        text-align: left !important;
      }
      .ledger tbody td:last-child { font-size: 1rem; margin-top: 0.3rem; }
      .page-title { font-size: 1.3rem; }
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
